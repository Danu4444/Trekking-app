<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users - Mt. Kinetics</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <div id="branding">
        <img src="../../img/logo.jpg" alt="Mt. Kinetics Logo" />
        <h1><span class="highlight">Mt.</span> Kinetics</h1>
      </div>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="../view_treks.html">View Treks</a></li>
          <li><a href="../treks/add_trek.html">Add Treks</a></li>
          <li><a href="../view_booking.html">Bookings</a></li>
          <li><a href="../../logout.php">Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="container">
    <section class="main-content">
      <div class="intro-section">
        <h2>Manage Registered Users</h2>
        <p>Below is a list of all users. You can remove users if necessary.</p>
      </div>

      <div id="user-list" class="trek-list-styled"></div>
    </section>
  </div>

  <script>
    fetch('../../php/get_users.php')
      .then(response => response.json())
      .then(data => {
        const userList = document.getElementById('user-list');
        userList.innerHTML = '';

        if (data.length === 0) {
          userList.innerHTML = '<p>No users found.</p>';
          return;
        }

        data.forEach(user => {
          const card = document.createElement('div');
          card.className = 'trek-item';

          card.innerHTML = `
            <div class="trek-info">
              <h3>${user.name}</h3>
              <p><strong>Email:</strong> ${user.email}</p>
              <p><strong>Phone:</strong> ${user.phone_number}</p>
              <form method="post" action="../../php/delete_user.php" onsubmit="return confirm('Are you sure you want to delete this user?');">
                <input type="hidden" name="user_id" value="${user.user_id}">
                <button type="submit" class="btn btn-danger">Remove User</button>
              </form>
            </div>
          `;
          userList.appendChild(card);
        });
      })
      .catch(error => {
        document.getElementById('user-list').innerHTML = '<p>No users.</p>';
        console.error('Error:', error);
      });
  </script>

  <footer>
    <p>Mt. Kinetics &copy; 2025</p>
  </footer>
</body>
</html>
