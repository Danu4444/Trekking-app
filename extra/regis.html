<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Trek Management System</title>
    <link rel="stylesheet" href="styles.css"> </head>
<body>
    <div class="registration-container">
        <h1>Create Your Account</h1>
        <p>Join us to explore amazing treks!</p>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="password-requirements">
                    <small>Min 8 characters, incl. uppercase, lowercase, number, special char.</small>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number (Optional)</label>
                <input type="tel" id="mobileNumber" name="mobileNumber">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="/terms">Terms and Conditions</a></label>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="privacy" name="privacy" checked>
                <label for="privacy">I agree to the <a href="/privacy">Privacy Policy</a></label>
            </div>

            <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>


            <button type="submit" class="register-button">Register</button>
        </form>

        <p class="login-link">Already have an account? <a href="/login">Log In</a></p>
    </div>

    <script src="script.js"></script> </body>
</html>
