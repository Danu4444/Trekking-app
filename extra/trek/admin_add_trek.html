<!DOCTYPE html>
<html>
<head>
  <title>Add Trek (With Image & Price)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      padding: 30px;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: auto;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    input[type="submit"] {
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h2 align="center">Add New Trek</h2>
  <form action="add_trek.php" method="POST" enctype="multipart/form-data">
    <label>Trek Name:</label>
    <input type="text" name="name" required>

    <label>Location:</label>
    <input type="text" name="location" required>

    <label>Date:</label>
    <input type="date" name="date" required>

    <label>Price (INR):</label>
    <input type="number" name="price" required>

    <label>Description:</label>
    <textarea name="description" rows="4" required></textarea>

    <label>Upload Trek Image:</label>
    <input type="file" name="image" accept="image/*" required>

    <input type="submit" value="Add Trek">
  </form>
</body>
</html>
