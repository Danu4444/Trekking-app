<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manage Bookings</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <h2>All Bookings</h2>
  <div id="bookings"></div>

  <script>
    fetch('../../php/get_bookings.php')
    .then(res => res.json())
    .then(data => {
      let html = '';
      data.forEach(b => {
        html += `<p>Booking ID: ${b.booking_id}, Trek: ${b.name}, User: ${b.user_id}, Status: ${b.status}
        <a href="../../php/cancel_booking.php?id=${b.booking_id}">[Cancel]</a></p>`;
      });
      document.getElementById('bookings').innerHTML = html;
    });
  </script>
</body>
</html>
