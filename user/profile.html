
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mt. Kinetics</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <img src="img/logo.jpg" alt="Mt. Kinetics Logo">
                <h1><span class="highlight">Mt.</span> Kinetics</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
        <li><a href="view_treks.html">View Treks</a></li>
        <li><a href="book_trek.html">Book Trek</a></li> 
     <li><a href="cancel_booking.html">Bookings</a></li>
        <li><a href="about.html">About Us</a></li>
    <li><a href="../logout.php">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="main-content">
            <div class="intro-section">
                <h2>Welcome Back, Adventurer!</h2>
                <p>
                  Update  users name to  Update Treks and to embark on new journeys of MT Kinetics.
                </p>
            </div>

            <div class="login-form-section">
                <form action="../php/update_profile.php" method="POST">
                     
                   <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="password-requirements">
                </div>
            </div>

           

            <div class="form-group">
                <label for="mobileNumber">Mobile Number (Optional)</label>
                <input type="tel" id="mobileNumber" name="phone">
            </div>
                    
                    <button type="submit" class="btn">Update</button>
                    
                </form>
               
                
            </div>
        </section>
    </div>

    <footer>
        <p>Mt. Kinetics &copy; 2025</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../php/get_profile.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('fullName').value = data.user.name;
                        document.getElementById('email').value = data.user.email;
                        document.getElementById('mobileNumber').value = data.user.phone_number;
                    } else {
                        window.location.href = '../login.html';
                    }
                })
                .catch(error => {
                    console.error('Error fetching profile:', error);
                });
        });
    </script>
</body>
</html>
